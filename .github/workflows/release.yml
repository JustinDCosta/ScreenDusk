name: release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build .\ScreenDusk.sln -c Release --no-restore

      - name: Publish Self-contained
        run: dotnet publish .\ScreenDusk.App\ScreenDusk.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true

      - name: Zip Artifact
        run: Compress-Archive -Path .\ScreenDusk.App\bin\Release\net8.0-windows\win-x64\publish\* -DestinationPath .\ScreenDusk-Windows-x64-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenDusk-Windows-x64-Portable
          path: ScreenDusk-Windows-x64-Portable.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ScreenDusk-Windows-x64-Portable.zip
          body: |
            Primary download: ScreenDusk-Windows-x64-Portable.zip

            After downloading, extract the zip and run ScreenDusk.exe.
          generate_release_notes: true
